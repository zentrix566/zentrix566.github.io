title: 赛博空间 | Cyber Space
description: 欢迎来到我的赛博空间 🚀
baseurl: ""
url: "https://zentrix566.github.io"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed

# Custom settings
navigation:
  - name: 首页
    link: /
  - name: 关于
    link: /about
  - name: 项目
    link: /projects
