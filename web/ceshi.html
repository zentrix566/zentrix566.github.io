<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面 - Zentrix云原生实验室</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-gradient: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3748;
            --test-color: #3182ce; /* 测试模式采用蓝色调 */
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem 3rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            font-size: 1.8rem;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        p {
            color: #718096;
            margin-bottom: 1.5rem;
        }

        /* 状态指示器：蓝色风格 */
        .status {
            display: inline-flex;
            align-items: center;
            background: rgba(49, 130, 206, 0.1);
            color: var(--test-color);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .status::before {
            content: "";
            width: 8px;
            height: 8px;
            background-color: var(--test-color);
            border-radius: 50%;
            margin-right: 8px;
        }

        /* 特性列表样式 */
        .feature-list {
            list-style: none;
            padding: 0;
            margin: 0 0 2rem 0;
            text-align: left; /* 列表左对齐更美观 */
            display: inline-block;
        }

        .feature-list li {
            padding: 8px 0;
            color: #4a5568;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        .feature-list li::before {
            content: "✦";
            color: var(--test-color);
            margin-right: 10px;
            font-weight: bold;
        }

        .deploy-info {
            font-size: 0.85rem;
            color: #a0aec0;
            background: #f7fafc;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px dashed #e2e8f0;
        }

        .back {
            display: inline-block;
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back:hover {
            color: #764ba2;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>测试页面</h1>
        <p>这是第二个演示页面</p>
        
        <div class="status">测试模式</div>

        <div style="text-align: center;">
            <ul class="feature-list">
                <li>页面功能正常</li>
                <li>路由配置正确</li>
                <li>Nginx 运行良好</li>
            </ul>
        </div>
        
        <div class="deploy-info">
            🛠️ 环境检测：由 GitHub Actions 自动构建发布
        </div>

        <a href="/" class="back">← 返回首页</a>
    </div>

</body>
</html>
