<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - Zentrix云原生实验室</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-gradient: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3748;
            --accent-color: #667eea;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.8rem;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .avatar-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .skill-section {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .skill-title {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.8rem;
            font-size: 1rem;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .skill-tag.secondary {
            background: linear-gradient(135deg, #2af598 0%, #009efd 100%);
        }

        .bio {
            color: #4a5568;
            line-height: 1.7;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .back {
            display: inline-block;
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back:hover {
            color: #764ba2;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>关于我</h1>
        <p class="subtitle">云原生 & DevOps 实践者</p>
        
        <div class="avatar-badge">Zentrix</div>

        <div class="bio">
            热衷于探索云原生技术，专注于构建高效可靠的自动化交付流程，
            持续学习容器化、微服务、GitOps 等现代化技术栈，
            追求代码与架构的优雅设计。
        </div>

        <div class="skill-section">
            <div class="skill-title">核心技术领域</div>
            <div class="skill-tags">
                <span class="skill-tag">DevOps</span>
                <span class="skill-tag">Kubernetes</span>
                <span class="skill-tag">Docker</span>
                <span class="skill-tag">CI/CD</span>
                <span class="skill-tag">GitOps</span>
            </div>
        </div>

        <div class="skill-section">
            <div class="skill-title">工具与平台</div>
            <div class="skill-tags">
                <span class="skill-tag secondary">GitHub Actions</span>
                <span class="skill-tag secondary">Terraform</span>
                <span class="skill-tag secondary">Ansible</span>
                <span class="skill-tag secondary">Prometheus</span>
                <span class="skill-tag secondary">Grafana</span>
                <span class="skill-tag secondary">Argo CD</span>
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <a href="/" class="back">← 返回首页</a>
        </div>
    </div>
</body>
</html>
